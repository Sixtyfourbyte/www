baseURL = 'https://www.64byte.dev'
locale = 'en-us'
title = '64byte.dev'
theme = "minimal-black"
defaultContentLanguage = 'en'
contentDir = 'content'
[author]
  name = "bz0qyz"
  homepage = "https://github.com/bz0qyz"

[params]
  brand = 'bz0qyz'
  logo = 'img/64byte-logo-icon.png'
  favicon = 'favicon.svg'
  appleTouchIcon = 'apple-touch-icon.svg'
  customCSS = ['css/custom.css', 'css/justifiedGallery.min.css']
  customJS = ['js/justifiedGallery.js']

  [params.icons]
    useFontAwesome = true
    useDevicon = true

  [params.theme]
    defaultTheme = "system"

[params.hero]
